<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .bg { fill: #1a1a1a; }
      .label { fill: #F9F6EF; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 30px; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #F9F6EF; }
        .label { fill: #1a1a1a; }
      }
    </style>
  </defs>
  <rect class="bg" width="100" height="100" rx="12" />
  <text class="label" x="50" y="64" text-anchor="middle" dominant-baseline="middle">CGS</text>
</svg>
